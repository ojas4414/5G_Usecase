node_id: "EDGE-NYC-5G-01"

# Legacy single-queue fallback.
# If `queue_zones` is not provided, this ROI is treated as one queue area.
roi_polygon:
  - [200, 200]
  - [800, 200]
  - [800, 600]
  - [200, 600]

# Time (in seconds) a tracked person must stay inside a queue zone to be
# considered "waiting in queue".
queue_wait_threshold_sec: 5.0

# Maximum time (in seconds) a person can be "lost" by the tracker before
# their queue wait time is reset.
track_grace_period_sec: 2.0

# Physical area of the fallback ROI (in square meters) used to calculate density.
roi_area_sqm: 10.0

# Optional multi-queue mode.
# Define one polygon per queue lane to track them independently.
#
# queue_zones:
#   - id: lane_a
#     name: Queue A
#     polygon:
#       - [200, 200]
#       - [500, 200]
#       - [500, 600]
#       - [200, 600]
#     area_sqm: 5.0
#     queue_wait_threshold_sec: 5.0
#     color: "#0f766e"
#   - id: lane_b
#     name: Queue B
#     polygon:
#       - [500, 200]
#       - [800, 200]
#       - [800, 600]
#       - [500, 600]
#     area_sqm: 5.0
#     queue_wait_threshold_sec: 5.0
#     color: "#b45309"

# Video source configuration.
# Set use_real_camera: true  -> use RTSP/HTTP camera streams and real latency probe.
# Set use_real_camera: false -> use video_source and simulated network profiles.
use_real_camera: true

# Local video source (used only when use_real_camera is false).
video_source: 0

# Saved RTSP camera URL.
# If the camera IP changes, startup will try this first and then fall back to
# automatic discovery while keeping the same credentials/path pattern.
camera_url: "rtsp://admin:admin123@10.101.0.12:554/avstream/channel=1/stream=1.sdp"

# Saved HTTP MJPEG fallback URL.
camera_http_url: "http://10.101.0.12/video"

# Preferred RTSP transport for the live runtime stream.
# TCP is the safest default for SIM/5G/NAT setups.
camera_rtsp_transport: "tcp"

# IP address used for real RTT probing.
# When auto-discovery is enabled, startup can overwrite this so probing follows
# the active camera automatically.
real_latency_probe_host: "10.101.0.12"

# Interval (in seconds) between ICMP latency probes to the camera host.
latency_probe_interval_sec: 1.0

# Automatic camera discovery settings.
# Used when saved camera URLs are empty or no longer reachable from the current
# machine or VM.
camera_auto_discovery:
  enabled: false
  sync_probe_host: true
  include_local_subnets: true
  prefer_scanned_camera: false
  max_hosts_per_subnet: 512
  max_workers: 128
  verbose: true
  rtsp_transport_order:
    - "tcp"
    - "udp"
  # Add known lab/private 5G ranges here if the VM is not on the same local
  # subnet as the camera or if you want to force a specific scan target.
  subnets:
    - "10.101.0.0/24"
  # candidate_ips:
  #   - "10.101.0.17"
